name: VercelDeploys
options:
  bundleIdPrefix: com.seb
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  VercelDeploys:
    type: application
    platform: macOS
    sources:
      - VercelDeploys
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seb.VercelDeploys
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: VercelDeploys/VercelDeploys.entitlements
        INFOPLIST_FILE: VercelDeploys/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: false
